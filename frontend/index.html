<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NetSniffer — Packet Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #050a0e;
    --panel:     #0a1520;
    --border:    #0d2235;
    --accent:    #00e5ff;
    --accent2:   #39ff14;
    --accent3:   #ff6b35;
    --warn:      #ffcc00;
    --danger:    #ff2d55;
    --text:      #c8dde8;
    --muted:     #4a6578;
    --font-mono: 'JetBrains Mono', monospace;
    --font-hud:  'Orbitron', sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;min-height:100vh;overflow-x:hidden}

  /* scanline overlay */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.015) 2px,rgba(0,229,255,0.015) 4px);
  }

  .header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px;border-bottom:1px solid var(--border);
    background:linear-gradient(90deg,#020d14,#081420,#020d14);
    position:sticky;top:0;z-index:100;
  }
  .logo{font-family:var(--font-hud);font-size:18px;color:var(--accent);letter-spacing:3px;text-shadow:0 0 20px var(--accent)}
  .logo span{color:var(--accent2)}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:all .3s}
  .status-dot.live{background:var(--accent2);box-shadow:0 0 8px var(--accent2);animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .hdr-right{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--muted)}

  .layout{display:grid;grid-template-columns:260px 1fr;gap:0;height:calc(100vh - 57px)}

  /* Sidebar */
  .sidebar{background:var(--panel);border-right:1px solid var(--border);padding:20px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
  .s-section{display:flex;flex-direction:column;gap:8px}
  .s-label{font-family:var(--font-hud);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  select,input{
    background:#06111a;border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);
    font-size:12px;padding:8px 10px;border-radius:3px;width:100%;outline:none;transition:border .2s
  }
  select:focus,input:focus{border-color:var(--accent)}
  .btn{
    font-family:var(--font-hud);font-size:11px;letter-spacing:2px;padding:10px 14px;
    border:none;border-radius:3px;cursor:pointer;transition:all .2s;width:100%;
  }
  .btn-start{background:var(--accent2);color:#000;box-shadow:0 0 12px rgba(57,255,20,.3)}
  .btn-start:hover{box-shadow:0 0 20px rgba(57,255,20,.6)}
  .btn-stop{background:var(--danger);color:#fff;box-shadow:0 0 12px rgba(255,45,85,.3)}
  .btn-stop:disabled{opacity:.4;cursor:not-allowed}
  .btn-export{background:transparent;border:1px solid var(--muted);color:var(--muted);font-size:10px}
  .btn-export:hover{border-color:var(--accent);color:var(--accent)}

  .stat-card{background:#06111a;border:1px solid var(--border);border-radius:4px;padding:12px;text-align:center}
  .stat-val{font-family:var(--font-hud);font-size:22px;color:var(--accent);line-height:1}
  .stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1px}

  /* Main area */
  .main{overflow-y:auto;display:flex;flex-direction:column;gap:0}

  /* Chart row */
  .chart-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border)}
  .chart-panel{padding:16px;border-right:1px solid var(--border)}
  .chart-panel:last-child{border-right:none}
  .cpanel-title{font-family:var(--font-hud);font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:12px}

  /* Rate graph */
  .rate-row{border-bottom:1px solid var(--border);padding:16px}

  /* Packet table */
  .table-area{flex:1;padding:0}
  .table-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--panel)}
  .table-header-title{font-family:var(--font-hud);font-size:10px;letter-spacing:2px;color:var(--muted)}
  .filter-input{width:220px;padding:5px 10px;font-size:11px}

  .packet-table{width:100%;border-collapse:collapse;font-size:11.5px}
  .packet-table th{
    position:sticky;top:0;background:#07101a;padding:8px 12px;text-align:left;
    font-family:var(--font-hud);font-size:9px;letter-spacing:2px;color:var(--muted);
    border-bottom:1px solid var(--border);z-index:10
  }
  .packet-table td{padding:5px 12px;border-bottom:1px solid #080e14;white-space:nowrap;overflow:hidden;max-width:160px;text-overflow:ellipsis}
  .packet-table tr:hover td{background:rgba(0,229,255,.04)}
  .packet-table tr.new-row td{animation:flashRow .5s ease-out}
  @keyframes flashRow{from{background:rgba(0,229,255,.12)}to{background:transparent}}

  .proto-badge{
    display:inline-block;padding:2px 6px;border-radius:2px;
    font-family:var(--font-hud);font-size:9px;letter-spacing:1px;
  }
  .proto-TCP{background:rgba(0,229,255,.15);color:var(--accent)}
  .proto-UDP{background:rgba(57,255,20,.12);color:var(--accent2)}
  .proto-ICMP{background:rgba(255,107,53,.15);color:var(--accent3)}
  .proto-DNS{background:rgba(255,204,0,.15);color:var(--warn)}
  .proto-HTTP{background:rgba(149,0,255,.15);color:#b06fff}
  .proto-HTTPS{background:rgba(0,149,255,.15);color:#4db8ff}
  .proto-ARP{background:rgba(255,45,85,.12);color:var(--danger)}
  .proto-OTHER,.proto-IPv6{background:rgba(74,101,120,.2);color:var(--muted)}

  /* Alert panel */
  .alert-panel{border-top:1px solid var(--border);max-height:160px;overflow-y:auto;background:#04090d}
  .alert-header{padding:8px 16px;font-family:var(--font-hud);font-size:10px;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--panel)}
  .alert-item{display:flex;align-items:flex-start;gap:10px;padding:7px 16px;border-bottom:1px solid #080e14;font-size:11px}
  .alert-item:last-child{border-bottom:none}
  .sev-HIGH{color:var(--danger)}
  .sev-MEDIUM{color:var(--warn)}
  .sev-LOW{color:var(--muted)}
  .alert-type{font-family:var(--font-hud);font-size:9px;letter-spacing:1px;min-width:90px}

  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border)}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}

  .conn-banner{
    position:fixed;bottom:16px;right:20px;background:#06111a;border:1px solid var(--border);
    border-radius:4px;padding:8px 14px;font-size:11px;color:var(--muted);z-index:200;
    display:flex;align-items:center;gap:8px;
  }

  /* recharts overrides */
  .recharts-tooltip-wrapper{font-family:var(--font-mono)!important;font-size:11px!important}
  .recharts-default-tooltip{background:#06111a!important;border:1px solid var(--border)!important;color:var(--text)!important}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const {
  PieChart, Pie, Cell, Tooltip, ResponsiveContainer,
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Legend,
  AreaChart, Area, LineChart, Line
} = Recharts;

const API = "http://localhost:8000";
const WS  = "ws://localhost:8000/ws";

const PROTO_COLORS = {
  TCP:"#00e5ff", UDP:"#39ff14", ICMP:"#ff6b35", DNS:"#ffcc00",
  HTTP:"#b06fff", HTTPS:"#4db8ff", ARP:"#ff2d55", OTHER:"#4a6578", IPv6:"#4a6578"
};

/* ─── Helpers ─────────────────────────────────────────────────────────── */
function protoBadge(p){ const cl = PROTO_COLORS[p] ? `proto-${p}` : "proto-OTHER"; return <span className={`proto-badge ${cl}`}>{p}</span>; }
function ts(iso){ return iso ? iso.split("T")[1]?.split(".")[0] ?? iso : ""; }
function clamp(arr, n){ return arr.length > n ? arr.slice(arr.length - n) : arr; }

/* ─── StatCard ───────────────────────────────────────────────────────── */
function StatCard({val, label}){
  return <div className="stat-card"><div className="stat-val">{val}</div><div className="stat-lbl">{label}</div></div>;
}

/* ─── Protocol Pie ───────────────────────────────────────────────────── */
function ProtocolPie({dist}){
  const data = Object.entries(dist).map(([k,v])=>({name:k, value:v.count}));
  if(!data.length) return <div style={{color:"var(--muted)",fontSize:11,paddingTop:40,textAlign:"center"}}>No data yet</div>;
  return(
    <ResponsiveContainer width="100%" height={160}>
      <PieChart>
        <Pie data={data} dataKey="value" innerRadius={40} outerRadius={65} paddingAngle={2}>
          {data.map((e,i)=><Cell key={i} fill={PROTO_COLORS[e.name]||"#4a6578"}/>)}
        </Pie>
        <Tooltip contentStyle={{background:"#06111a",border:"1px solid #0d2235",fontSize:11}}
                 formatter={(v,n)=>[v,n]}/>
      </PieChart>
    </ResponsiveContainer>
  );
}

/* ─── Top IPs bar ────────────────────────────────────────────────────── */
function TopIPsBar({ips}){
  const data = Object.entries(ips).slice(0,8).map(([k,v])=>({ip:k.split(".").slice(-2).join("."), full:k, count:v}));
  if(!data.length) return <div style={{color:"var(--muted)",fontSize:11,paddingTop:40,textAlign:"center"}}>No data yet</div>;
  return(
    <ResponsiveContainer width="100%" height={160}>
      <BarChart data={data} layout="vertical" margin={{left:10,right:10}}>
        <XAxis type="number" tick={{fill:"#4a6578",fontSize:9}} axisLine={false} tickLine={false}/>
        <YAxis type="category" dataKey="ip" tick={{fill:"#4a6578",fontSize:9}} width={60} axisLine={false} tickLine={false}/>
        <Tooltip contentStyle={{background:"#06111a",border:"1px solid #0d2235",fontSize:11}}
                 formatter={(v,n,p)=>[v+" pkts", p.payload.full]}/>
        <Bar dataKey="count" fill="#00e5ff" radius={[0,2,2,0]}/>
      </BarChart>
    </ResponsiveContainer>
  );
}

/* ─── Size histogram ──────────────────────────────────────────────────── */
function SizeHist({histogram}){
  if(!histogram?.length) return <div style={{color:"var(--muted)",fontSize:11,paddingTop:40,textAlign:"center"}}>No data yet</div>;
  return(
    <ResponsiveContainer width="100%" height={160}>
      <BarChart data={histogram} margin={{left:-10,right:10}}>
        <XAxis dataKey="range" tick={{fill:"#4a6578",fontSize:8}} axisLine={false} tickLine={false}/>
        <YAxis tick={{fill:"#4a6578",fontSize:9}} axisLine={false} tickLine={false}/>
        <Tooltip contentStyle={{background:"#06111a",border:"1px solid #0d2235",fontSize:11}}/>
        <Bar dataKey="count" fill="#39ff14" radius={[2,2,0,0]}/>
      </BarChart>
    </ResponsiveContainer>
  );
}

/* ─── Rate chart ─────────────────────────────────────────────────────── */
function RateChart({rateHistory}){
  return(
    <ResponsiveContainer width="100%" height={60}>
      <AreaChart data={rateHistory} margin={{top:2,bottom:2,left:0,right:0}}>
        <defs>
          <linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="5%" stopColor="#00e5ff" stopOpacity={0.3}/>
            <stop offset="95%" stopColor="#00e5ff" stopOpacity={0}/>
          </linearGradient>
        </defs>
        <XAxis dataKey="t" hide/>
        <YAxis hide/>
        <Tooltip contentStyle={{background:"#06111a",border:"1px solid #0d2235",fontSize:10}} formatter={v=>[v+" pkt/s"]}/>
        <Area type="monotone" dataKey="rate" stroke="#00e5ff" strokeWidth={1.5} fill="url(#rg)" dot={false} isAnimationActive={false}/>
      </AreaChart>
    </ResponsiveContainer>
  );
}

/* ─── Alert Panel ────────────────────────────────────────────────────── */
function AlertPanel({alerts}){
  return(
    <div className="alert-panel">
      <div className="alert-header">⚠ ALERTS ({alerts.length})</div>
      {alerts.length === 0 && <div style={{padding:"12px 16px",color:"var(--muted)",fontSize:11}}>No suspicious activity detected</div>}
      {alerts.map(a=>(
        <div key={a.id} className="alert-item">
          <span className={`alert-type sev-${a.severity}`}>{a.type}</span>
          <span style={{color:"var(--muted)",minWidth:70,fontSize:10}}>{ts(a.timestamp)}</span>
          <span style={{color: a.severity==="HIGH"?"var(--danger)": a.severity==="MEDIUM"?"var(--warn)":"var(--muted)"}}>{a.message}</span>
        </div>
      ))}
    </div>
  );
}

/* ─── Main App ───────────────────────────────────────────────────────── */
function App(){
  const [running, setRunning] = useState(false);
  const [iface, setIface]     = useState("");
  const [filter, setFilter]   = useState("");
  const [interfaces, setIfaces] = useState([]);
  const [packets, setPackets]   = useState([]);
  const [stats, setStats]       = useState({});
  const [alerts, setAlerts]     = useState([]);
  const [rateHist, setRateHist] = useState([]);
  const [filterQ, setFilterQ]   = useState("");
  const [wsStatus, setWsStatus] = useState("disconnected");

  const wsRef    = useRef(null);
  const tableRef = useRef(null);
  const tickRef  = useRef(0);

  /* fetch interfaces */
  useEffect(()=>{
    fetch(`${API}/interfaces`).then(r=>r.json()).then(d=>{
      if(d.interfaces?.length) {
        const normalized = d.interfaces.map(i =>
          typeof i === "string" ? {id: i, description: i, ip: ""} : i
        );
        setIfaces(normalized);
        // prefer interface with a real IP (not 169.254.x.x or loopback)
        const best = normalized.find(i => i.ip && !i.ip.startsWith("169.254") && i.ip !== "127.0.0.1")
                  || normalized.find(i => i.ip)
                  || normalized[0];
        setIface(best.id);
      }
    }).catch(()=>{});
    fetch(`${API}/alerts`).then(r=>r.json()).then(setAlerts).catch(()=>{});
  },[]);

  /* websocket */
  useEffect(()=>{
    const connect = ()=>{
      const ws = new WebSocket(WS);
      wsRef.current = ws;
      ws.onopen = ()=>setWsStatus("connected");
      ws.onclose = ()=>{ setWsStatus("disconnected"); setTimeout(connect, 3000); };
      ws.onerror = ()=>setWsStatus("error");
      ws.onmessage = (e)=>{
        const msg = JSON.parse(e.data);
        if(msg.type === "packet"){
          const pkt = {...msg.data, _new: true, _id: tickRef.current++};
          setPackets(prev => clamp([...prev, pkt], 500));
          if(msg.alert) setAlerts(prev => [msg.alert, ...prev].slice(0,100));
          // auto scroll
          requestAnimationFrame(()=>{ if(tableRef.current) tableRef.current.scrollTop = tableRef.current.scrollHeight; });
        }
        if(msg.type === "stats"){
          const s = msg.data;
          setStats(s);
          setRateHist(prev => clamp([...prev, {t: new Date().toLocaleTimeString(), rate: s.packet_rate||0}], 60));
        }
      };
    };
    connect();
    return ()=>wsRef.current?.close();
  },[]);

  const startCapture = async ()=>{
    await fetch(`${API}/start_capture?interface=${iface}&filter=${filter}`,{method:"POST"});
    setRunning(true);
    setPackets([]);
    setAlerts([]);
  };

  const stopCapture = async ()=>{
    await fetch(`${API}/stop_capture`,{method:"POST"});
    setRunning(false);
  };

  const exportPcap = ()=>{ window.open(`${API}/export_pcap`,"_blank"); };

  const filtered = filterQ
    ? packets.filter(p => [p.src_ip,p.dst_ip,p.protocol,p.src_port,p.dst_port].join(" ").toLowerCase().includes(filterQ.toLowerCase()))
    : packets;

  const dist = stats.protocol_distribution || {};
  const topIPs = stats.top_src_ips || {};
  const sizeInfo = stats.packet_size || {};

  return(
    <>
    {/* Header */}
    <div className="header">
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div className="logo">NET<span>SNIFFER</span></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div className={`status-dot ${running?"live":""}`}/>
          <span style={{fontSize:10,color:"var(--muted)",letterSpacing:1}}>{running?"CAPTURING":"IDLE"}</span>
        </div>
      </div>
      <div className="hdr-right">
        <span>PKTS: <strong style={{color:"var(--accent)"}}>{stats.total_packets||0}</strong></span>
        <span>RATE: <strong style={{color:"var(--accent2)"}}>{stats.packet_rate||0}/s</strong></span>
        <span>IPS: <strong style={{color:"var(--accent3)"}}>{stats.unique_src_ips||0}</strong></span>
        <span>ALERTS: <strong style={{color: alerts.length?"var(--danger)":"var(--muted)"}}>{alerts.length}</strong></span>
      </div>
    </div>

    <div className="layout">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="s-section">
          <div className="s-label">Interface</div>
          <select value={iface} onChange={e=>setIface(e.target.value)} disabled={running}>
            {interfaces.map(i=><option key={i.id} value={i.id}>{i.description}{i.ip ? ` — ${i.ip}` : ""}</option>)}
          </select>
        </div>
        <div className="s-section">
          <div className="s-label">BPF Filter</div>
          <input value={filter} onChange={e=>setFilter(e.target.value)} disabled={running} placeholder="tcp, udp, port 80…"/>
        </div>
        <div className="s-section">
          <button className="btn btn-start" onClick={startCapture} disabled={running}>▶ START CAPTURE</button>
          <button className="btn btn-stop"  onClick={stopCapture}  disabled={!running}>■ STOP</button>
          <button className="btn btn-export" onClick={exportPcap}>↓ EXPORT PCAP</button>
        </div>

        <div style={{borderTop:"1px solid var(--border)",paddingTop:16}}>
          <div className="s-label" style={{marginBottom:8}}>Stats</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <StatCard val={stats.total_packets||0} label="TOTAL PACKETS"/>
            <StatCard val={`${stats.packet_rate||0}/s`} label="PACKET RATE"/>
            <StatCard val={stats.unique_src_ips||0} label="UNIQUE SRC IPs"/>
            <StatCard val={`${sizeInfo.avg||0}B`} label="AVG SIZE"/>
          </div>
        </div>

        <div style={{borderTop:"1px solid var(--border)",paddingTop:16}}>
          <div className="s-label" style={{marginBottom:8}}>Top Ports</div>
          {Object.entries(stats.top_ports||{}).slice(0,6).map(([port,cnt])=>(
            <div key={port} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",fontSize:11,borderBottom:"1px solid #080e14"}}>
              <span style={{color:"var(--accent)"}}>{port}</span>
              <span style={{color:"var(--muted)"}}>{cnt}</span>
            </div>
          ))}
        </div>

        {wsStatus !== "connected" &&
          <div style={{background:"rgba(255,45,85,.1)",border:"1px solid rgba(255,45,85,.3)",borderRadius:3,padding:8,fontSize:10,color:"var(--danger)"}}>
            ⚠ Backend offline — start server on :8000 (demo mode shows simulated data once connected)
          </div>
        }
      </div>

      {/* Main */}
      <div className="main">
        {/* Charts */}
        <div className="chart-row">
          <div className="chart-panel">
            <div className="cpanel-title">PROTOCOL DISTRIBUTION</div>
            <ProtocolPie dist={dist}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:"4px 10px",marginTop:6}}>
              {Object.entries(dist).map(([k,v])=>(
                <span key={k} style={{fontSize:10,color:PROTO_COLORS[k]||"#4a6578"}}>{k} {v.pct}%</span>
              ))}
            </div>
          </div>
          <div className="chart-panel">
            <div className="cpanel-title">TOP SOURCE IPs</div>
            <TopIPsBar ips={topIPs}/>
          </div>
          <div className="chart-panel">
            <div className="cpanel-title">PACKET SIZE HISTOGRAM</div>
            <SizeHist histogram={sizeInfo.histogram}/>
            <div style={{display:"flex",gap:12,fontSize:10,color:"var(--muted)",marginTop:4}}>
              <span>MIN <strong style={{color:"var(--text)"}}>{sizeInfo.min||0}</strong></span>
              <span>MAX <strong style={{color:"var(--text)"}}>{sizeInfo.max||0}</strong></span>
              <span>AVG <strong style={{color:"var(--text)"}}>{sizeInfo.avg||0}</strong></span>
            </div>
          </div>
        </div>

        {/* Rate */}
        <div className="rate-row">
          <div className="cpanel-title" style={{marginBottom:6}}>TRAFFIC RATE (pkts/sec)</div>
          <RateChart rateHistory={rateHist}/>
        </div>

        {/* Packet Table */}
        <div className="table-area">
          <div className="table-header">
            <div className="table-header-title">LIVE PACKET STREAM ({filtered.length})</div>
            <input className="filter-input" placeholder="Search IP / protocol / port…" value={filterQ} onChange={e=>setFilterQ(e.target.value)}/>
          </div>
          <div ref={tableRef} style={{height:"300px",overflowY:"auto"}}>
            <table className="packet-table">
              <thead>
                <tr>
                  <th>TIME</th><th>SRC IP</th><th>DST IP</th>
                  <th>SRC PORT</th><th>DST PORT</th><th>PROTO</th><th>LEN</th><th>FLAGS</th>
                </tr>
              </thead>
              <tbody>
                {filtered.slice(-200).map((p,i)=>(
                  <tr key={p._id ?? i} className={p._new?"new-row":""}>
                    <td style={{color:"var(--muted)"}}>{ts(p.timestamp)}</td>
                    <td style={{color:"var(--accent)"}}>{p.src_ip||"—"}</td>
                    <td style={{color:"var(--text)"}}>{p.dst_ip||"—"}</td>
                    <td style={{color:"var(--muted)"}}>{p.src_port||"—"}</td>
                    <td style={{color:"var(--muted)"}}>{p.dst_port||"—"}</td>
                    <td>{protoBadge(p.protocol||"OTHER")}</td>
                    <td style={{color:"var(--text)"}}>{p.length}</td>
                    <td style={{color:"var(--warn)",fontSize:10}}>{p.flags||""}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {filtered.length === 0 && (
              <div style={{textAlign:"center",padding:"40px 0",color:"var(--muted)",fontSize:12}}>
                {running?"Waiting for packets…":"Start capture to see live packets"}
              </div>
            )}
          </div>
        </div>

        {/* Alerts */}
        <AlertPanel alerts={alerts.slice(0,30)}/>
      </div>
    </div>

    {/* WS status pill */}
    <div className="conn-banner">
      <div className={`status-dot ${wsStatus==="connected"?"live":""}`}/>
      {wsStatus === "connected" ? "WS connected" : wsStatus === "disconnected" ? "Reconnecting…" : "WS error"}
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
